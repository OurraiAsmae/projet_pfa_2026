networks:
  fraud-net:
    external: true
    name: fraud-governance-net

volumes:
  mlflow_data:
  redis_data:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [fraud-net]

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [fraud-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fraud-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]
    networks: [fraud-net]

  mlflow:
    image: python:3.10-slim
    command: >
      bash -c "pip install mlflow==2.9.0 --quiet &&
               mlflow server --host 0.0.0.0 --port 5000
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks: [fraud-net]

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks: [fraud-net]

  flink-jobmanager:
    image: flink:1.17-scala_2.12
    command: jobmanager
    ports:
      - "8082:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    networks: [fraud-net]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [fraud-net]

  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on: [redis]
    networks: [fraud-net]

  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - /home/asmae/fraud-governance-system/mlops:/app/mlops
      - /home/asmae/fraud-governance-system/redis:/app/redis_lib
      - /home/asmae/fraud-governance-system/blockchain/network/crypto-material:/home/asmae/fraud-governance-system/blockchain/network/crypto-material:ro
      - /home/asmae/fraud-governance-system/blockchain/network:/home/asmae/fraud-governance-system/blockchain/network:ro
      - /home/asmae/fraud-governance-system/fabric-samples/bin/peer:/usr/local/bin/peer:ro
    environment:
      - REDIS_HOST=redis
      - GATEWAY_URL=http://host.gateway.internal:9999
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    extra_hosts:
      - "host.gateway.internal:host-gateway"
    depends_on: [redis, mlflow]
    networks: [fraud-net]

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - GATEWAY_URL=http://gateway:9999
      - MLFLOW_URL=http://mlflow:5000
    depends_on: [api, gateway, mlflow]
    networks: [fraud-net]

  governance-processor:
    build:
      context: .
      dockerfile: streaming/Dockerfile
    volumes:
      - /home/asmae/fraud-governance-system/mlops:/app/mlops
      - /home/asmae/fraud-governance-system/redis:/app/redis_lib
    environment:
      - REDIS_HOST=redis
      - GATEWAY_URL=http://host.gateway.internal:9999
    extra_hosts:
      - "host.gateway.internal:host-gateway"
    depends_on: [redis]
    networks: [fraud-net]
  gateway:
    build: ./blockchain/gateway
    ports:
      - "9999:9999"
    volumes:
      - /home/asmae/fraud-governance-system/blockchain/network/crypto-material:/crypto-material:ro
      - /home/asmae/fraud-governance-system/blockchain/network:/fabric-config:ro
      - /home/asmae/fraud-governance-system/fabric-samples/bin:/fabric-bin:ro
    environment:
      - CRYPTO_PATH=/crypto-material
      - FABRIC_CFG_PATH=/fabric-config
      - PEER_BIN=/fabric-bin/peer
      - PORT=9999
    networks: [fraud-net]
  drift-monitor:
    build: ./drift
    volumes:
      - /home/asmae/fraud-governance-system/mlops:/app/mlops
      - /home/asmae/fraud-governance-system/redis:/app/redis_lib
    environment:
      - REDIS_HOST=redis
      - GATEWAY_URL=http://gateway:9999
      - API_URL=http://api:8000
      - DRIFT_THRESHOLD=0.15
      - CRITICAL_THRESHOLD=0.30
      - CHECK_INTERVAL=60
    depends_on: [redis, gateway, api]
    networks: [fraud-net]
