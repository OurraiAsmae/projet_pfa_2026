Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-material/ordererOrganizations/fraud-governance.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
      BlockValidation:
        Type: Signature
        Rule: "OR('OrdererMSP.orderer')"

  - &BankOrg
    Name: BankOrg
    ID: BankMSP
    MSPDir: crypto-material/peerOrganizations/bank.fraud-governance.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('BankMSP.admin','BankMSP.peer','BankMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('BankMSP.admin','BankMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('BankMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('BankMSP.peer')"
    AnchorPeers:
      - Host: peer0.bank.fraud-governance.com
        Port: 7051

  - &AuditOrg
    Name: AuditOrg
    ID: AuditMSP
    MSPDir: crypto-material/peerOrganizations/audit.fraud-governance.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('AuditMSP.admin','AuditMSP.peer','AuditMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('AuditMSP.admin','AuditMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('AuditMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('AuditMSP.peer')"
    AnchorPeers:
      - Host: peer0.audit.fraud-governance.com
        Port: 9051

  - &RegulatorOrg
    Name: RegulatorOrg
    ID: RegulatorMSP
    MSPDir: crypto-material/peerOrganizations/regulator.fraud-governance.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegulatorMSP.admin','RegulatorMSP.peer','RegulatorMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegulatorMSP.admin','RegulatorMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegulatorMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegulatorMSP.peer')"
    AnchorPeers:
      - Host: peer0.regulator.fraud-governance.com
        Port: 10051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "ANY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "ANY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.fraud-governance.com:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.fraud-governance.com
        Port: 7050
        ClientTLSCert: crypto-material/ordererOrganizations/fraud-governance.com/orderers/orderer.fraud-governance.com/tls/server.crt
        ServerTLSCert: crypto-material/ordererOrganizations/fraud-governance.com/orderers/orderer.fraud-governance.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  # Channel Bank only
  BankChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *BankOrg
      Capabilities:
        <<: *ApplicationCapabilities

  # Channel Bank + Audit
  BankAuditChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *BankOrg
        - *AuditOrg
      Capabilities:
        <<: *ApplicationCapabilities

  # Channel Audit + Regulator
  AuditRegulatorChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *AuditOrg
        - *RegulatorOrg
      Capabilities:
        <<: *ApplicationCapabilities
